services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: npc-dialogue-app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/npc_dialogue
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - WORLDBUILDING_DIR=/app/worldbuilding
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - npc-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: npc-dialogue-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - npc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: npc-dialogue-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: npc_dialogue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - npc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    container_name: npc-dialogue-frontend
    ports:
      - "5173:5173"
    working_dir: /app/src/frontend
    volumes:
      - ./src/frontend:/app/src/frontend
    environment:
      - VITE_API_TARGET=http://app:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app
    networks:
      - npc-network
    restart: unless-stopped

  # --- Monitoring stack ---
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: npc-dialogue-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - app
    networks:
      - npc-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: npc-dialogue-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - npc-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  npc-network:
    driver: bridge
