# Alembic configuration for NPC Dialogue Engine
# -----------------------------------------------
# Database URL is loaded from the application settings (src.config)
# at runtime via env.py, so the placeholder below is never used directly.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder – overridden in env.py from Settings.DATABASE_URL
sqlalchemy.url = postgresql://postgres:password@localhost:5432/npc_dialogue

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
