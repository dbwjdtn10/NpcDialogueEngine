name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # 1. Lint – fast feedback on code style
  # ------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  # ------------------------------------------------------------------
  # 2. Test – unit tests with mocked external services
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          GEMINI_API_KEY: "test-key"
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/npc_dialogue"
          REDIS_URL: "redis://localhost:6379"
        run: pytest tests/ -v --tb=short -x

  # ------------------------------------------------------------------
  # 3. Docker – verify the image builds successfully
  # ------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: npc-dialogue-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
